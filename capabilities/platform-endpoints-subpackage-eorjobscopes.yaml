      name: eor-job-scopes
      description: REST surface for eor-job-scopes.
      operations:
      - method: GET
        name: getjobscopes
        description: List of job scope templates for EOR contracts
        call: platform-endpoints-subpackage-eorjobscopes.getjobscopes
