      operations:
      - method: GET
        name: retrieveterminationdetails
        description: Retrieve termination details
        call: platform-endpoints-subpackage-offboarding.retrieveterminationdetails
        with:
          id: rest.id
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
