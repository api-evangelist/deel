      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contracts-endpoints-subpackage-offcycle.getcontractoffcyclepayments
      with:
        contract_id: tools.contract_id
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-off-cycle-payment
      description: Retrieve a single off-cycle payment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contracts-endpoints-subpackage-offcycle.getcontractoffcyclepaymentbyid
