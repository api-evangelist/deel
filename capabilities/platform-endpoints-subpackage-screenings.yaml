naftiko: 1.0.0-alpha2
info:
  label: Endpoints — subpackage_screenings
  description: 'Endpoints — subpackage_screenings. 6 operations. Lead operation: Get entity screening details. Self-contained
    Naftiko capability covering one Deel business surface.'
  tags:
  - Deel
  - subpackage_screenings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEL_API_KEY: DEEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-endpoints-subpackage-screenings
    baseUri: https://api.letsdeel.com/rest/v2
    description: Endpoints — subpackage_screenings business capability. Self-contained, no shared references.
    resources:
    - name: screenings-aml-entity_type-entity_id
      path: /screenings/aml/{entity_type}/{entity_id}
      operations:
      - name: getamldetails
        method: GET
        description: Get entity screening details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entity_type
          in: path
          type: string
          description: The type of entity to screen. Only 'profile', 'hris_profile', 'legal_entity' are accepted.
          required: true
        - name: entity_id
          in: path
          type: string
          description: UUID v4 of the entity
          required: true
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    - name: screenings-kyc-details
      path: /screenings/kyc/details
      operations:
      - name: getkycdetails
        method: GET
        description: Get worker's KYC details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: worker_profile_id
          in: query
          type: string
          description: Worker's HRIS profile public ID client requests to fetch KYC details for. This parameter is mutually
            exclusive with profile_id
        - name: contract_id
          in: query
          type: string
          description: 'Worker''s contract ID. This parameter is required in case there are multiple profiles associated to
            the target worker. For example, when worker used to work for '
        - name: profile_id
          in: query
          type: string
          description: Worker's profile public ID client requests to fetch KYC details for, This parameter is mutually exclusive
            with worker_profile_id
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    - name: screenings-kyc-external
      path: /screenings/kyc/external
      operations:
      - name: submitexternalkyc
        method: POST
        description: Submit external KYC
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: screenings-manual-verification
      path: /screenings/manual-verification
      operations:
      - name: createmanualverification
        method: POST
        description: Create manual verification screening
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: screenings-verification-method
      path: /screenings/verification-method
      operations:
      - name: getverificationmethod
        method: GET
        description: Get verification method
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: country
          in: query
          type: string
          description: The document's issuing country code (ISO 3166-1 alpha-2)
          required: true
        - name: document_type
          in: query
          type: string
          description: The document to be provided during KYC
          required: true
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    - name: veriff-session
      path: /veriff/session
      operations:
      - name: createveriffsession
        method: POST
        description: Create Veriff session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DEEL_API_KEY}}'
  exposes:
