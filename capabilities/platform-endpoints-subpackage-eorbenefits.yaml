    resources:
    - name: eor-contract_id-benefits
      path: /eor/{contract_id}/benefits
      operations:
      - name: geteorbenefitsbycontractid
        method: GET
        description: Retrieve Benefits for EOR Contract
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
