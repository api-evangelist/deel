naftiko: 1.0.0-alpha2
info:
  label: Endpoints — subpackage_policies
  description: 'Endpoints — subpackage_policies. 1 operations. Lead operation: List IT hardware policies. Self-contained Naftiko
    capability covering one Deel business surface.'
  tags:
  - Deel
  - subpackage_policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEL_API_KEY: DEEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-endpoints-subpackage-policies
    baseUri: https://api.letsdeel.com/rest/v2
    description: Endpoints — subpackage_policies business capability. Self-contained, no shared references.
    resources:
    - name: it-policies
      path: /it/policies
      operations:
      - name: getitpolicies
        method: GET
        description: List IT hardware policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    authentication:
      type: bearer
      token: '{{env.DEEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-endpoints-subpackage-policies-rest
    port: 8080
    description: REST adapter for Endpoints — subpackage_policies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/it/policies
      name: it-policies
      description: REST surface for it-policies.
      operations:
      - method: GET
        name: getitpolicies
        description: List IT hardware policies
        call: platform-endpoints-subpackage-policies.getitpolicies
        with:
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-endpoints-subpackage-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Endpoints — subpackage_policies. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-it-hardware-policies
      description: List IT hardware policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-endpoints-subpackage-policies.getitpolicies
      with:
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
