    resources:
    - name: consent_token
      path: /consent_token
      operations:
      - name: createconsenttoken
        method: POST
        description: Create a consent token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
