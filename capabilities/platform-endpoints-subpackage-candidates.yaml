    transport: http
    description: MCP adapter for Endpoints — subpackage_candidates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: add-candidate
      description: Add Candidate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-endpoints-subpackage-candidates.addcandidate
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
