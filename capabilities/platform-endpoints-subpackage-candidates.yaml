  - type: http
    namespace: platform-endpoints-subpackage-candidates
    baseUri: https://api.letsdeel.com/rest/v2
    description: Endpoints — subpackage_candidates business capability. Self-contained, no shared references.
    resources:
    - name: candidates
      path: /candidates
      operations:
      - name: addcandidate
        method: POST
        description: Add Candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DEEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-endpoints-subpackage-candidates-rest
    port: 8080
    description: REST adapter for Endpoints — subpackage_candidates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/candidates
      name: candidates
      description: REST surface for candidates.
      operations:
      - method: POST
        name: addcandidate
        description: Add Candidate
        call: platform-endpoints-subpackage-candidates.addcandidate
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
