          in: query
          type: array
          description: Filter by case type IDs
        - name: statuses
          in: query
          type: array
          description: Filter by case status
        - name: countries
          in: query
          type: array
          description: Filter by country. Uses ISO 3166-1 alpha-2 codes (https://www.iban.com/country-codes).
