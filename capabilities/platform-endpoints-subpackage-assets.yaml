naftiko: 1.0.0-alpha2
info:
  label: Endpoints — subpackage_assets
  description: 'Endpoints — subpackage_assets. 2 operations. Lead operation: List IT assets. Self-contained Naftiko capability
    covering one Deel business surface.'
  tags:
  - Deel
  - subpackage_assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEL_API_KEY: DEEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-endpoints-subpackage-assets
    baseUri: https://api.letsdeel.com/rest/v2
    description: Endpoints — subpackage_assets business capability. Self-contained, no shared references.
    resources:
    - name: it-assets
      path: /it/assets
      operations:
      - name: getitassets
        method: GET
        description: List IT assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: Indicates where the next page of results starts, as returned in a paginated list response
        - name: limit
          in: query
          type: integer
          description: Return a page of results with given number of records
        - name: hris_profile_id
          in: query
          type: string
          description: Filter assets by assigned worker with given HRIS Profile ID
        - name: location
          in: query
          type: string
          description: Filter assets by their location
        - name: category
          in: query
          type: string
          description: Filter assets by their product category
        - name: status
          in: query
          type: string
          description: Filter assets by their status
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    - name: it-assets-asset_id
      path: /it/assets/{asset_id}
      operations:
      - name: getitassetbyid
        method: GET
        description: Retrieve an IT asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asset_id
          in: path
          type: string
          description: Unique identifier of the IT asset
          required: true
        - name: Authorization
          in: header
          type: string
          description: '## Authentication'
          required: true
    authentication:
      type: bearer
      token: '{{env.DEEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-endpoints-subpackage-assets-rest
    port: 8080
    description: REST adapter for Endpoints — subpackage_assets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/it/assets
      name: it-assets
      description: REST surface for it-assets.
      operations:
      - method: GET
        name: getitassets
        description: List IT assets
        call: platform-endpoints-subpackage-assets.getitassets
        with:
          cursor: rest.cursor
          limit: rest.limit
          hris_profile_id: rest.hris_profile_id
          location: rest.location
          category: rest.category
          status: rest.status
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/it/assets/{asset-id}
      name: it-assets-asset-id
      description: REST surface for it-assets-asset_id.
      operations:
      - method: GET
        name: getitassetbyid
        description: Retrieve an IT asset
        call: platform-endpoints-subpackage-assets.getitassetbyid
        with:
          asset_id: rest.asset_id
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-endpoints-subpackage-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Endpoints — subpackage_assets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-it-assets
      description: List IT assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-endpoints-subpackage-assets.getitassets
      with:
        cursor: tools.cursor
        limit: tools.limit
        hris_profile_id: tools.hris_profile_id
        location: tools.location
        category: tools.category
        status: tools.status
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-it-asset
      description: Retrieve an IT asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-endpoints-subpackage-assets.getitassetbyid
      with:
        asset_id: tools.asset_id
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
