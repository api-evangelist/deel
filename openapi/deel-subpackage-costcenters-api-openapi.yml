openapi: 3.1.0
info:
  title: Endpoints subpackage_costCenters API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_costCenters
paths:
  /legal-entities/{legal_entity_id}/cost-centers:
    get:
      operationId: get-legal-entity-cost-centers
      summary: Get cost centers by legal entity
      description: "Fetch all cost centers related to a given legal entity id\n **Token scopes**: `legal-entity:read`"
      tags:
      - subpackage_costCenters
      parameters:
      - name: legal_entity_id
        in: path
        description: Legal entity id
        required: true
        schema:
          type: string
          format: uuid
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Cost center data was successfully fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cost-centers_getLegalEntityCostCenters_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCostCentersByLegalEntityRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
  /contracts/{contract_id}/cost-centers:
    post:
      operationId: assign-cost-centers-to-an-employment-contract-v-2026-01-01
      summary: Assign cost centers to an employment contract
      description: "Assign cost centers to employment by contract id\n **Token scopes**: `contracts:write`"
      tags:
      - subpackage_costCenters
      parameters:
      - name: contract_id
        in: path
        description: Employment's contract ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Cost center allocation was successfully added to the contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cost Centers_assignCostCentersToAnEmploymentContract-v2026-01-01_Response_201'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignCostCentersToAnEmploymentContract-v2026-01-01RequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
      requestBody:
        description: Cost center information to allocate to the contract
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '#/components/schemas/ContractsContractIdCostCentersPostRequestBodyContentApplicationJsonSchemaData'
              required:
              - data
  /legal-entities/{legal_entity_id}/cost-centers/synchronize:
    post:
      operationId: sync-cost-centers-for-legal-entity-v-2026-01-01
      summary: Sync cost centers for legal entity
      description: "Update legal entity cost center's data to replicate the data provided on the request\n **Token scopes**: `legal-entity:write`"
      tags:
      - subpackage_costCenters
      parameters:
      - name: legal_entity_id
        in: path
        description: Legal entity id
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Cost center data was successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cost Centers_syncCostCentersForLegalEntity-v2026-01-01_Response_201'
        '400':
          description: Cannot define legal entity cost centers as the provided data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncCostCentersForLegalEntity-v2026-01-01RequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncCostCentersForLegalEntity-v2026-01-01RequestInternalServerError'
      requestBody:
        description: Cost center data to overwrite current configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/LegalEntitiesLegalEntityIdCostCentersSynchronizePostRequestBodyContentApplicationJsonSchemaDataItems'
              required:
              - data
