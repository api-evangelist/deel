        id:
          type: integer
          format: int64
          description: Cost center id
        created_at:
          type: string
          format: date-time
          description: Cost center date of registration on Deel. Long date-time format following ISO-8601
        updated_at:
          type: string
          format: date-time
          description: Cost center date of most recent update on Deel. Long date-time format following ISO-8601
        cost_center_name:
          type: string
          description: Cost center name to be displayed
        cost_center_number:
          type: string
          description: Cost center code
      title: LegalEntitiesLegalEntityIdCostCentersSynchronizePostResponsesContentApplicationJsonSchemaDataItems
    SyncCostCentersForLegalEntity-v2026-01-01RequestInternalServerError:
