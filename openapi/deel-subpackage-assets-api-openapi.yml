openapi: 3.1.0
info:
  title: Endpoints subpackage_assets API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_assets
paths:
  /it/assets/{asset_id}:
    get:
      operationId: get-it-asset-by-id
      summary: Retrieve an IT asset
      description: "Retrieve the details of a specific IT asset using its unique identifier. This allows you to check information such as the asset's model, serial number, status, and location.  For more info, visit [Assets](https://developer.deel.com/docs/deel-it-api#assets).\n **Token scopes**: `it-assets:read`"
      tags:
      - subpackage_assets
      parameters:
      - name: asset_id
        in: path
        description: Unique identifier of the IT asset
        required: true
        schema:
          type: string
          format: uuid
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/assets_getITAssetById_Response_200'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveAnItAssetRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveAnItAssetRequestInternalServerError'
  /it/assets:
    get:
      operationId: get-it-assets
      summary: List IT assets
      description: "Retrieve a paginated list of all IT assets managed by the organization. This is useful for getting a complete overview of your equipment inventory and understanding the state of each asset. For more info, visit [Assets](https://developer.deel.com/docs/deel-it-api#assets).\n **Token scopes**: `it-assets:read`"
      tags:
      - subpackage_assets
      parameters:
      - name: cursor
        in: query
        description: Indicates where the next page of results starts, as returned in a paginated list response
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Return a page of results with given number of records
        required: false
        schema:
          type: integer
          default: 20
      - name: hris_profile_id
        in: query
        description: Filter assets by assigned worker with given HRIS Profile ID
        required: false
        schema:
          type: string
          format: uuid
      - name: location
        in: query
        description: Filter assets by their location
        required: false
        schema:
          $ref: '#/components/schemas/ItAssetsGetParametersLocation'
      - name: category
        in: query
        description: Filter assets by their product category
        required: false
        schema:
          $ref: '#/components/schemas/ItAssetsGetParametersCategory'
      - name: status
        in: query
        description: Filter assets by their status
        required: false
        schema:
          $ref: '#/components/schemas/ItAssetsGetParametersStatus'
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/assets_getITAssets_Response_200'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItAssetsRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItAssetsRequestInternalServerError'
