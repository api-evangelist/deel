        errors:
          type: array
          items:
            $ref: '#/components/schemas/EorWorkersComplianceDocumentsDocumentIdPostResponsesContentApplicationJsonSchemaErrorsItems'
      title: UploadEmployeeComplianceDocument-v2026-01-01RequestForbiddenError
    ApiError:
      type: object
      properties:
        message:
          type: string
