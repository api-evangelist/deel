      title: UploadEmployeeComplianceDocument-v2026-01-01RequestUnauthorizedError
    eor-worker-compliance_uploadEORWorkerComplianceDocument_Response_200:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/EorWorkersComplianceDocumentsDocumentIdPostResponsesContentApplicationJsonSchemaData'
      required:
      - data
      title: eor-worker-compliance_uploadEORWorkerComplianceDocument_Response_200
    DownloadSubmittedComplianceDocumentRequestBadRequestError:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/EorWorkersComplianceDocumentsDocumentIdDownloadGetResponsesContentApplicationJsonSchemaErrorsItems'
        request:
          $ref: '#/components/schemas/EorWorkersComplianceDocumentsDocumentIdDownloadGetResponsesContentApplicationJsonSchemaRequest'
      title: DownloadSubmittedComplianceDocumentRequestBadRequestError
    ListOfEmployeeComplianceDocuments-v2026-01-01RequestInternalServerError:
      type: object
