openapi: 3.1.0
info:
  title: Endpoints subpackage_eorWorkerCompliance API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_eorWorkerCompliance
paths:
  /eor/workers/compliance-documents/{document_id}/acknowledgement:
    post:
      operationId: create-compliance-document-acknowledgement
      summary: Acknowledge a compliance document
      description: "API endpoint to submit consent for compliance documents that require acknowledgement.\n **Token scopes**: `worker:write`"
      tags:
      - subpackage_eorWorkerCompliance
      parameters:
      - name: document_id
        in: path
        description: The unique identifier of the compliance document.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Document was acknowledged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-compliance_createComplianceDocumentAcknowledgement_Response_204'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgeAComplianceDocumentRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgeAComplianceDocumentRequestInternalServerError'
  /eor/workers/compliance-documents/{document_id}/templates/download:
    get:
      operationId: download-compliance-document-template
      summary: Download employee compliance document template
      description: "Get the download link for an employee compliance document template, if it exists.\n **Token scopes**: `worker:read`"
      tags:
      - subpackage_eorWorkerCompliance
      parameters:
      - name: document_id
        in: path
        description: Unique identifier for a compliance document in Deel.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-compliance_downloadComplianceDocumentTemplate_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
  /eor/workers/compliance-documents/{document_id}/download:
    get:
      operationId: download-compliance-document
      summary: Download submitted compliance document
      description: "Get the download link for an employee's submitted compliance document.\n **Token scopes**: `worker:read`"
      tags:
      - subpackage_eorWorkerCompliance
      parameters:
      - name: document_id
        in: path
        description: Unique identifier for a compliance document in Deel.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-compliance_downloadComplianceDocument_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadSubmittedComplianceDocumentRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
  /eor/workers/compliance-documents:
    get:
      operationId: get-eor-worker-compliance-documents
      summary: List of employee compliance documents
      description: "Get a list of employee compliance documents.\n **Token scopes**: `worker:read`"
      tags:
      - subpackage_eorWorkerCompliance
      parameters:
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-compliance_getEORWorkerComplianceDocuments_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '401':
          description: Authentication failed. The access token is missing, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOfEmployeeComplianceDocuments-v2026-01-01RequestUnauthorizedError'
        '403':
          description: Access denied. The authenticated user does not have the required worker:read scope or is not an employee profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOfEmployeeComplianceDocuments-v2026-01-01RequestForbiddenError'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOfEmployeeComplianceDocuments-v2026-01-01RequestInternalServerError'
  /eor/workers/compliance-documents/{document_id}:
    post:
      operationId: upload-eor-worker-compliance-document
      summary: Upload employee compliance document
      description: "Upload compliance document for an EOR employee.\n **Token scopes**: `worker:write`"
      tags:
      - subpackage_eorWorkerCompliance
      parameters:
      - name: document_id
        in: path
        description: Unique identifier for a compliance document in Deel.
        required: true
        schema:
          type: string
          format: uuid
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-compliance_uploadEORWorkerComplianceDocument_Response_200'
        '400':
          description: Bad request. The file is missing or the document_id format is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEmployeeComplianceDocument-v2026-01-01RequestBadRequestError'
        '401':
          description: Authentication failed. Bearer token is missing, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEmployeeComplianceDocument-v2026-01-01RequestUnauthorizedError'
        '403':
          description: Forbidden. The worker does not have permission to upload to this compliance document, the document cannot be submitted in its current state, or the requirement is obsolete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEmployeeComplianceDocument-v2026-01-01RequestForbiddenError'
        '404':
          description: The compliance document specified by document_id was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEmployeeComplianceDocument-v2026-01-01RequestNotFoundError'
        '500':
          description: Internal server error. The file upload failed or an unexpected error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEmployeeComplianceDocument-v2026-01-01RequestInternalServerError'
      requestBody:
        description: The employee compliance document data to upload
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'The employee compliance document to upload. Accepted formats: PNG, JPG, JPEG, HEIC, PDF.'
components:
  schemas:
    EorWorkersComplianceDocumentsGetResponsesContentApplicationJsonSchemaErrorsItems:
      type: object
      properties:
        code:
