          type: string
          description: Contract id. This is the id of the contract associated with the time off request.
        requested_at:
          type: string
          format: date
          description: This is the date when the time off request was made.
        half_end_date:
          type: boolean
          description: Whether the end date is a half day or not.
        time_off_type:
          $ref: '#/components/schemas/TimeOffsTimeOffIdPatchResponsesContentApplicationJsonSchemaTimeOffTimeOffType'
          description: The type of time off taken.
