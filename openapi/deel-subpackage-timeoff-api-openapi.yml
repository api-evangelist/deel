          type: string
          description: Description of the time off request. Some policies require that a description is provided.
        contract_oid:
          type:
          - string
          - 'null'
          description: Contract id. This is the id of the contract associated with the time off request.
        requested_at:
          type: string
          format: date
          description: This is the date when the time off request was made.
        half_end_date:
