          type: string
          format: uuid
          description: Time off type id. This is the id of the time off type associated with the time off request.
        recipient_profile:
          $ref: '#/components/schemas/TimeOffsTimeOffIdPatchResponsesContentApplicationJsonSchemaTimeOffRecipientProfile'
          description: The time off profile of the recipient of the time off request. Must be a worker profile.
        requester_profile:
          $ref: '#/components/schemas/TimeOffsTimeOffIdPatchResponsesContentApplicationJsonSchemaTimeOffRequesterProfile'
          description: The time off profile of the requester of the time off request. Can be either a client or worker profile.
