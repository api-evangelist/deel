openapi: 3.1.0
info:
  title: Endpoints subpackage_learning API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_learning
paths:
  /engage/learning/actionable-journeys:
    get:
      operationId: retrieve-workers-actionable-journeys
      summary: Retrieve worker's actionable journeys
      description: "Return list of ActionableJourneys for a given Worker. The concept of Actionable Journeys in the Public API corresponds directly to what is labeled as Courses in the user interface. Learn more about [Learning Management](https://www.deel.com/hr/engage/learning-management-software/)\n **Token scopes**: `worker:read`"
      tags:
      - subpackage_learning
      parameters:
      - name: journey_ids
        in: query
        description: Filter by Journey IDs.
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
      - name: journey_assignment_ids
        in: query
        description: Filter by JourneyAssignment IDs.
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
      - name: limit
        in: query
        description: Return a page of results with given number of records.
        required: false
        schema:
          type: number
          format: double
          default: 20
      - name: cursor
        in: query
        description: Cursor to the next page of results. If not provided, the first page will be returned.
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful retrieval of actionable journeys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Learning_retrieveWorkersActionableJourneys_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveWorkersActionableJourneysRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
