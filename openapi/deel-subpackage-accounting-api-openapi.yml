        overtime:
          type: string
          description: Overtime payment amount.
        pro_rata:
          type: string
          description: Pro-rated payment amount.
        approvers:
          type: string
          description: Comma-separated list of names of people who approved this payment. May be empty if no approvals were required or recorded.
        frequency:
          $ref: '#/components/schemas/PaymentsPaymentIdBreakdownGetResponsesContentApplicationJsonSchemaDataItemsFrequency'
          description: Work unit scale from the contractor's work statement. Indicates how work is measured and reported (hourly, daily, weekly, monthly, or custom units). Empty for contracts with fixed payments that don't require work quantity tracking, such as milestone-based contracts and consulting agreements.
