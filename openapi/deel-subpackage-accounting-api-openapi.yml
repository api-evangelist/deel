        processing_fee:
          type: string
          description: Processing fee amount applied to the payment.
        contract_country:
          type: string
          description: Country where the contract is established.
        contractor_email:
          type: string
          description: Email address of the worker.
        payment_currency:
          type: string
          description: Currency in which the payment was processed.
        contract_start_date:
          $ref: '#/components/schemas/PaymentsPaymentIdBreakdownGetResponsesContentApplicationJsonSchemaDataItemsContractStartDate'
