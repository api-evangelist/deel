openapi: 3.1.0
info:
  title: Endpoints subpackage_legalEntities API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_legalEntities
paths:
  /legal-entities:
    post:
      operationId: create-legal-entity
      summary: Create a new legal entity
      description: "Create a new legal entity under an organization.\n **Token scopes**: `legal-entity:write`, `legal-entity:read`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successfully created legal entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legal-entities_createLegalEntity_Response_200'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLegalEntityRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Permission denied. User must have the `entities.manage` permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLegalEntityRequestForbiddenError'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '#/components/schemas/LegalEntitiesPostRequestBodyContentApplicationJsonSchemaData'
    get:
      operationId: get-legal-entities
      summary: List of legal entities
      description: "Retrieve a list of legal entities in your account.\n **Token scopes**: `organizations:read`, `accounting:read`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: limit
        in: query
        description: The number of results to return per page.
        required: false
        schema:
          type: integer
          default: 100
      - name: sort_order
        in: query
        description: Sorting order of the results.
        required: false
        schema:
          $ref: '#/components/schemas/LegalEntitiesGetParametersSortOrder'
      - name: cursor
        in: query
        description: Cursor for pagination.
        required: false
        schema:
          type: string
      - name: include_archived
        in: query
        description: Whether to include archived legal entities in the results.
        required: false
        schema:
          type: boolean
          default: true
      - name: legal_entity_id
        in: query
        description: Filter by specific legal entity ID.
        required: false
        schema:
          type: string
      - name: global_payroll
        in: query
        description: Filter by global payroll flag.
        required: false
        schema:
          type: boolean
      - name: type
        in: query
        description: Filter by entity type.
        required: false
        schema:
          type: string
      - name: country
        in: query
        description: Filter by country.
        required: false
        schema:
          type: string
      - name: include_payroll_settings
        in: query
        description: Whether to include payroll settings in the response.
        required: false
        schema:
          type: boolean
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legal-entities_getLegalEntities_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
  /legal-entities/{id}:
    delete:
      operationId: delete-legal-entity
      summary: Delete a legal entity
      description: "Archive a legal entity. This marks the entity as inactive but does not permanently remove it.\n **Token scopes**: `legal-entity:read`, `legal-entity:write`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: id
        in: path
        description: The ID of the legal entity to archive.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successfully archived the legal entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legal-entities_deleteLegalEntity_Response_200'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteLegalEntityRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Permission denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteLegalEntityRequestForbiddenError'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
    patch:
      operationId: update-legal-entity
      summary: Edit a legal entity
      description: "Update the details of an existing legal entity.\n **Token scopes**: `legal-entity:read`, `legal-entity:write`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: id
        in: path
        description: The ID of the legal entity to update.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successfully updated the legal entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legal-entities_updateLegalEntity_Response_200'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditLegalEntityRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Permission denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditLegalEntityRequestForbiddenError'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the legal entity.
                phone:
                  type: string
                  description: The phone number of the legal entity.
                address:
                  $ref: '#/components/schemas/LegalEntitiesIdPatchRequestBodyContentApplicationJsonSchemaAddress'
                sic_number:
                  type: string
                  description: The SIC number of the legal entity.
                entity_type:
                  type: string
                  description: The type of the legal entity.
                industry_name:
                  type: string
                  description: The industry name of the legal entity.
                company_identifiers:
                  $ref: '#/components/schemas/LegalEntitiesIdPatchRequestBodyContentApplicationJsonSchemaCompanyIdentifiers'
                  description: Identifiers associated with the legal entity.
  /industries:
    get:
      operationId: get-industries
      summary: List all industry subcategories
      description: "List industry subcategories with their parent category details, supporting cursor-based pagination and sorting by category or subcategory name. Each subcategory is identified by a UUID and includes NAICS codes. Used during entity setup to select an industry classification.\n **Token scopes**: `legal-entity:read`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: limit
        in: query
        description: Maximum number of items to return per page.
        required: false
        schema:
          type: integer
      - name: order
        in: query
        description: Sorting order of the results.
        required: false
        schema:
          $ref: '#/components/schemas/IndustriesGetParametersOrder'
      - name: sort_by
        in: query
        description: Field used to sort the results.
        required: false
        schema:
          $ref: '#/components/schemas/IndustriesGetParametersSortBy'
      - name: cursor
        in: query
        description: Cursor used for paginating to the next page of results.
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of industry subcategories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/legal-entities_getIndustries_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllIndustrySubcategories-v2026-01-01RequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
  /benefits/legal-entities/{id}:
    get:
      operationId: get-legal-entity-data-from-organization-integrated-with-external-benefits-vendor-v-2026-01-01
      summary: Get legal entity data from organization integrated with external benefits vendor
      description: "Returns legal entity data for an organization integrated with an external benefits vendor, identified by `id`, including registration details, address, entity type, and employment classification.\n **Token scopes**: `organizations:read`"
      tags:
      - subpackage_legalEntities
      parameters:
      - name: id
        in: path
        description: Id from the legal entity to fetch data
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Legal Entities_getLegalEntityDataFromOrganizationIntegratedWithExternalBenefitsVendor-v2026-01-01_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
components:
