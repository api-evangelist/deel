      title: EditLegalEntityRequestForbiddenError
    DeleteLegalEntityRequestBadRequestError:
      type: object
      properties:
        message:
          type: string
          description: Error message explaining what went wrong.
      title: DeleteLegalEntityRequestBadRequestError
    BenefitsLegalEntitiesIdGetResponsesContentApplicationJsonSchemaRegistrationAddress:
      type: object
      properties:
        zip:
          type: string
        city:
          type: string
        state:
          type: string
        street:
          type: string
        country:
          type: string
        province:
          type: string
