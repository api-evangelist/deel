        address:
          $ref: '#/components/schemas/LegalEntitiesPostRequestBodyContentApplicationJsonSchemaDataAddress'
          description: The physical address of the entity.
        sic_number:
          type: string
          description: The SIC number for the entity.
        entity_type:
          type: string
