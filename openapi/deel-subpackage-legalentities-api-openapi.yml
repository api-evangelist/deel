      - registration_number
      title: LegalEntitiesPostRequestBodyContentApplicationJsonSchemaDataCompanyIdentifiers
    LegalEntitiesPostRequestBodyContentApplicationJsonSchemaData:
      type: object
      properties:
        name:
          type: string
