paths:
  /employee-info/contract-types/{type}/countries/{country}:
    get:
      operationId: employee-additional-info-template-v-2026-01-01
      summary: Employee additional info template
      description: "Lists employee additional info template by the contract type and the employment country\n **Token scopes**: `contracts:read`"
      tags:
      - subpackage_employeeInformation
      parameters:
      - name: type
        in: path
        description: The contract type. Must be 'eor' (Employer of Record) or 'gp' (Global Payroll).
        required: true
        schema:
          $ref: '#/components/schemas/EmployeeInfoContractTypesTypeCountriesCountryGetParametersType'
      - name: country
        in: path
        description: ISO 3166-1 alpha-2 country code.
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee Information_employeeAdditionalInfoTemplate-v2026-01-01_Response_200'
        '400':
          description: Invalid country code or contract type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestBadRequestError'
        '401':
          description: Authentication failed. The access token is missing, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestUnauthorizedError'
        '403':
          description: Access denied. The authenticated user does not have the required contracts:read scope or contracts.view permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestForbiddenError'
        '404':
          description: No additional info template exists for the given country and contract type combination in the Employee Data Management system.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestNotFoundError'
        '429':
          description: Rate limit exceeded. The client has sent too many requests in a given time window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestTooManyRequestsError'
        '500':
          description: Internal server error. Returned when the Employee Data Management service is unreachable or an unexpected error occurs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAdditionalInfoTemplate-v2026-01-01RequestInternalServerError'
