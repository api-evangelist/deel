        required: true
        schema:
          type: string
          format: uuid
      - name: date_start
        in: query
        description: Start date in the format 'YYYY-MM-DD'. Must not be earlier than 5 years ago.
        required: false
        schema:
          type: string
          format: date
      - name: date_end
        in: query
        description: End date in the format 'YYYY-MM-DD'. Must not exceed 5 years in the future.
        required: false
        schema:
          type: string
          format: date
      - name: limit
        in: query
        description: Maximum number of items to return.
        required: false
        schema:
          type: integer
          default: 20
      - name: cursor
        in: query
        description: Pagination cursor, CUID or UUID format.
