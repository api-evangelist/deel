      title: AccountsPayableVendorBillsVendorBillIdAttachmentsPostResponsesContentApplicationJsonSchemaData
    AccountsPayableVendorBillsPostResponsesContentApplicationJsonSchemaData:
      type: object
      properties:
        id:
          type: string
