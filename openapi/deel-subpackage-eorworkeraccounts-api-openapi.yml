paths:
  /eor/worker:
    post:
      operationId: create-worker
      summary: Create EOR Worker
      description: "Create EOR Worker\n **Token scopes**: `people:write`"
      tags:
      - subpackage_eorWorkerAccounts
      parameters:
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eor-worker-accounts_createWorker_Response_201'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEorWorker-v2026-01-01RequestBadRequestError'
        '401':
          description: Operation failed.
          content:
