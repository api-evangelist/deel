        request:
          $ref: '#/components/schemas/EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaRequest'
      title: FetchEorContractDocumentsRequestBadRequestError
    EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaDataItemsDocumentType:
      type: string
      enum:
      - FRAMEWORK_AGREEMENT
      description: The type of document. Currently only FRAMEWORK_AGREEMENT is supported.
      title: EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaDataItemsDocumentType
    EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaDataItems:
      type: object
      properties:
        signature:
          type:
          - string
          - 'null'
          description: The signature of the client if the document is signed.
        signed_at:
          type:
          - string
          - 'null'
          format: date-time
          description: The date and time the client signed the document if it is signed.
        document_type:
          $ref: '#/components/schemas/EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaDataItemsDocumentType'
          description: The type of document. Currently only FRAMEWORK_AGREEMENT is supported.
        eor_signature:
          type:
          - string
          - 'null'
          description: The signature of the EOR if the document is signed.
        eor_signed_at:
          type:
          - string
          - 'null'
          format: date-time
          description: The date and time the EOR signed the document if it is signed.
        client_job_title:
          type:
          - string
          - 'null'
          description: The job title of the client if the document is signed.
      required:
      - document_type
      title: EorContractsContractIdDocumentsGetResponsesContentApplicationJsonSchemaDataItems
