          type: string
          format: date
          description: The desired end date of the contract. If the date is not provided, Deel HRX team will select the nearest possible date.
        severance_amount:
          type: integer
          description: The amount of severance needed
        additional_reason:
          oneOf:
          - $ref: '#/components/schemas/EorContractsContractIdOffboardingTerminationPostRequestBodyContentMultipartFormDataSchemaDataAdditionalReason'
