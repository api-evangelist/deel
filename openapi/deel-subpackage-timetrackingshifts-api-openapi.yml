              type: object
              properties:
                data:
                  $ref: '#/components/schemas/TimeTrackingShiftsBulkDeletePostRequestBodyContentApplicationJsonSchemaData'
                  description: Request data containing the external IDs of shifts to be deleted.
              required:
              - data
