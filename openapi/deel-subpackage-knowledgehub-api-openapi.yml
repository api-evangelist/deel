    get:
      operationId: get-knowledge-hub-country-guides-by-country-code
      summary: Get Knowledge Hub Country Guides by Country Code
      description: "Retrieve country guide for different audience and contract type by the country code\n **Token scopes**: `knowledge-hub:read`"
      tags:
      - subpackage_knowledgeHub
      parameters:
      - name: country_code
        in: path
        description: Country code for which we need to fetch the country guides
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response containing audiences, their contract types, and associated categories, fields, and articles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Knowledge Hub_getKnowledgeHubCountryGuidesByCountryCode_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetKnowledgeHubCountryGuidesByCountryCodeRequestBadRequestError'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
