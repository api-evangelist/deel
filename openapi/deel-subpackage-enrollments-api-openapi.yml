    post:
      operationId: enroll-an-employee-in-a-401-k-plan-v-2026-01-01
      summary: Enroll an employee in a 401k plan
      description: "Enroll an employee in a 401k plan\n **Token scopes**: `benefits:write`"
      tags:
      - subpackage_enrollments
      parameters:
      - name: legal_entity_id
        in: path
        description: Legal entity id which employee/contract belongs
        required: true
        schema:
          type: string
      - name: contract_id
        in: path
        description: Contract id from the employee
        required: true
        schema:
          type: string
      - name: plan_id
        in: path
        description: Plan id to enroll the employee into
        required: true
        schema:
          type: string
