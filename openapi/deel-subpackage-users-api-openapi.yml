          items:
            $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsSchemasItems'
        userName:
          type: string
        userType:
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsAddressesItems'
        urn:ietf:params:scim:schemas:extension:2.0:User:
          $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20User'
        urn:ietf:params:scim:schemas:extension:enterprise:2.0:User:
          $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtensionEnterprise20User'
      required:
      - meta
      - name
      - emails
      - schemas
      - userName
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItems
    UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserCustomFieldsItems:
      type: object
      properties:
        id:
          type: string
        name:
          type:
          - string
          - 'null'
        value:
          type:
          - string
          - 'null'
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserCustomFieldsItems
    UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItems:
      type: object
      properties:
        team:
          $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsTeam'
        state:
          type:
          - string
          - 'null'
        title:
          type:
          - string
          - 'null'
        active:
          type: boolean
          default: false
        country:
          type:
          - string
          - 'null'
        startDate:
          type:
          - string
          - 'null'
        contractId:
          type: string
        contractType:
          type:
          - string
          - 'null'
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItems'
          description: Contract-level custom fields associated with the employment
        employeeNumber:
          type:
          - string
          - 'null'
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItems
    ErrorResponseSchemasItems:
      type: string
      enum:
      - urn:ietf:params:scim:api:messages:2.0:Error
      title: ErrorResponseSchemasItems
    ? UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItems
    : type: object
      properties:
        id:
          type: string
        data:
          oneOf:
          - $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItemsData'
          - type: 'null'
          description: 'The custom field value payload. Structure varies by field type: Text/Number/Date have {value}, Percentage has {value, text}, Currency has {amount, currency}, List has {option}, Multiselect has {options}.'
        name:
          type: string
        type:
          type: string
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItems
    UsersGetResponsesContentApplicationJsonSchemaResourcesItemsMeta:
      type: object
      properties:
        created:
          type: string
        location:
          type: string
        lastModified:
          type: string
        resourceType:
          $ref: '#/components/schemas/UsersGetResponsesContentApplicationJsonSchemaResourcesItemsMetaResourceType'
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsMeta
    ? UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItemsData
    : type: object
      properties: {}
      description: 'The custom field value payload. Structure varies by field type: Text/Number/Date have {value}, Percentage has {value, text}, Currency has {amount, currency}, List has {option}, Multiselect has {options}.'
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsCustomFieldsItemsData
    Manager:
      type: object
      properties:
        value:
          type: string
          description: Manager's unique identifier.
        displayName:
          type: string
          description: Manager's full name.
        email:
          type: string
          description: Manager's email.
      required:
      - value
      title: Manager
    UserSearchResponseSchemasItems:
      type: string
      enum:
      - urn:ietf:params:scim:api:messages:2.0:ListResponse
      title: UserSearchResponseSchemasItems
    UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsTeam:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
      title: UsersGetResponsesContentApplicationJsonSchemaResourcesItemsUrnIetfParamsScimSchemasExtension20UserEmploymentsItemsTeam
    Address:
      type: object
      properties:
        streetAddress:
          type: string
          description: Street and number.
        locality:
          type: string
          description: Locality name.
        region:
          type: string
          description: Region code.
        postalCode:
          type: string
          description: Postal code.
        country:
          $ref: '#/components/schemas/CountryCode'
        type:
          type: string
          description: Address type.
      title: Address
    SearchRequest:
      type: object
      properties:
        count:
          type: integer
          description: page size
        filter:
          type: string
