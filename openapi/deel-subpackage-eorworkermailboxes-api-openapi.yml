openapi: 3.1.0
info:
  title: Endpoints subpackage_eorWorkerMailboxes API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
