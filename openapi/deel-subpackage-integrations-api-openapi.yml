      title: Integrations_getIntegrationConsent_Response_200
    IntegrationsConsentGetResponsesContentApplicationJsonSchemaData:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the consent.
        scope:
          type: string
          description: Scope of the consent.
        state:
          type: string
          description: State of the consent.
        status:
          type: string
          description: Status of the consent.
        user_id:
          type:
          - string
          - 'null'
          description: User ID associated with the consent.
        client_id:
          type: string
          description: Client ID associated with the consent.
        user_name:
          type:
          - string
          - 'null'
          description: User name associated with the consent.
        created_at:
          type: string
          description: Creation date for the consent.
        expires_at:
          type: string
          description: Expiration date for the consent.
        profile_id:
          type:
          - string
          - 'null'
          description: Profile ID associated with the consent.
        updated_at:
          type: string
          description: Update date for the consent.
        user_email:
          type:
          - string
          - 'null'
          description: User email associated with the consent.
        redirect_uri:
          type: string
          description: Redirect URI for the consent.
        organization_id:
          type:
          - string
          - 'null'
          description: Organization ID associated with the consent.
      title: IntegrationsConsentGetResponsesContentApplicationJsonSchemaData
    ApiError:
      type: object
