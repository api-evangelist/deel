  schemas:
    BenefitsLegalEntitiesLegalEntityIdPaystubsGetResponsesContentApplicationJsonSchemaDataPage:
      type: object
      properties:
        cursor:
          type:
          - string
          - 'null'
          description: The last fetched id to start querying from
        total_rows:
          type: integer
          description: Total number of rows
        items_per_page:
          type: integer
          description: Items per page
      title: BenefitsLegalEntitiesLegalEntityIdPaystubsGetResponsesContentApplicationJsonSchemaDataPage
    BenefitsLegalEntitiesLegalEntityIdPaystubsGetResponsesContentApplicationJsonSchemaData:
