openapi: 3.1.0
info:
  title: Endpoints subpackage_paystubs API
  version: 1.0.0
servers:
- url: https://api.letsdeel.com/rest/v2
- url: https://api-staging.letsdeel.com/rest/v2
tags:
- name: subpackage_paystubs
paths:
  /benefits/legal-entities/{legal_entity_id}/paystubs:
    get:
      operationId: get-paystubs-from-legal-entity-integrated-with-external-benefits-vendor-v-2026-01-01
      summary: Get paystubs from legal entity integrated with external benefits vendor
      description: "Returns paginated paystubs for a legal entity that is integrated with an external benefits vendor. Results can be filtered by payroll state and date range; paystubs in the `OPEN` state do not include employee-level detail.\n **Token scopes**: `benefits:read`"
      tags:
      - subpackage_paystubs
      parameters:
      - name: legal_entity_id
        in: path
        description: Id from the legal entity to fetch data
        required: true
        schema:
          type: string
      - name: states
        in: query
        description: 'Payroll states: OPEN | LOCKED | CLOSED (OPEN doesn''t have `employees` info)'
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/BenefitsLegalEntitiesLegalEntityIdPaystubsGetParametersStatesSchemaItems'
      - name: date_start
        in: query
        description: Start date to fectch the paystubs from
        required: false
        schema:
          type: string
      - name: date_end
        in: query
        description: End date to fectch the paystubs
        required: false
        schema:
          type: string
      - name: items_per_page
        in: query
        description: Items per page
        required: false
        schema:
          type: integer
          default: 10
      - name: cursor
        in: query
        description: The last fetched id to start querying from
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: "## Authentication\nThe Deel API uses bearer tokens to authenticate requests. All API calls must be made over HTTPS — calls over plain HTTP or without authentication will fail.\n\n```curl\ncurl -X GET 'https://api.letsdeel.com/rest/v2/contracts' \\\n  -H 'Authorization: Bearer YOUR-TOKEN-HERE'\n```\n\n[Learn more about authentication](/api/authentication)\n"
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paystubs_getPaystubsFromLegalEntityIntegratedWithExternalBenefitsVendor-v2026-01-01_Response_200'
        '400':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '401':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '403':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '404':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
        '500':
          description: Operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorContainer'
