specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Deel
providerId: deel
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - HR
  - Payroll
  - Global Hiring
  - EOR
  - Contractors
  - Plans
description: >-
  Deel commercial plans across Contractor management, Employer of Record,
  Global Payroll, US PEO, Deel HR, and Deel IT. Pricing is per-worker-month
  unless noted; the API itself is included with paid product tiers.
sources:
  - https://www.deel.com/pricing/
  - https://developer.deel.com/
plans:
  - id: deel-contractors-standard
    name: Contractors — Standard
    type: per-seat
    description: Compliant contractor management with localized contracts and global payouts.
    entries:
      - label: Per Contractor / Month
        name: contractor_seat
        type: flat
        metric: contractors
        timeFrame: monthly
        unit: 1
        price: '49'
        currency: USD
        userMultiplied: true
    elements:
      - name: Localized contractor agreements in 150+ countries
      - name: Multi-currency contractor payouts
      - name: API and webhooks access
  - id: deel-contractor-of-record
    name: Contractor of Record
    type: per-seat
    description: Deel acts as the legal contracting entity, eliminating misclassification risk.
    entries:
      - label: Per Contractor / Month
        name: contractor_of_record_seat
        type: flat
        metric: contractors
        timeFrame: monthly
        unit: 1
        price: '325'
        currency: USD
        userMultiplied: true
    elements:
      - name: Deel as the legal contracting entity
      - name: Misclassification protection
  - id: deel-eor-standard
    name: Employer of Record — Standard
    type: per-seat
    description: Full legal employment in 110+ countries with payroll, taxes, and benefits.
    entries:
      - label: Per Employee / Month
        name: eor_seat
        type: flat
        metric: employees
        timeFrame: monthly
        unit: 1
        price: '599'
        currency: USD
        userMultiplied: true
    elements:
      - name: Local legal entity, payroll, and tax handling
      - name: Statutory and supplemental benefits
      - name: API access
  - id: deel-eor-enterprise
    name: Employer of Record — Enterprise
    type: per-seat
    description: EOR with dedicated onboarding manager and legal response guarantees.
    entries:
      - label: Per Employee / Month
        name: eor_enterprise_seat
        type: flat
        metric: employees
        timeFrame: monthly
        unit: 1
        price: '899'
        currency: USD
        userMultiplied: true
    elements:
      - name: Dedicated onboarding manager
      - name: Legal response SLAs
      - name: Premium support
  - id: deel-us-peo
    name: US PEO
    type: per-seat
    description: Co-employment PEO across all 50 US states with payroll and compliance.
    entries:
      - label: Per Employee / Month (starting)
        name: us_peo_seat
        type: flat
        metric: employees
        timeFrame: monthly
        unit: 1
        price: '125'
        currency: USD
        userMultiplied: true
  - id: deel-global-payroll
    name: Managed Global Payroll
    type: per-seat
    description: Fully managed in-country payroll for entities Deel does not employ for.
    entries:
      - label: Per Employee / Month
        name: global_payroll_seat
        type: flat
        metric: employees
        timeFrame: monthly
        unit: 1
        price: '29'
        currency: USD
        userMultiplied: true
  - id: deel-us-payroll
    name: Managed US Payroll
    type: per-seat
