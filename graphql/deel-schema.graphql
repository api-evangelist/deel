  PAYONEER
  PAYPAL
  CRYPTO
  DEEL_BALANCE
  CHECK
}

enum PayrollCycleFrequency {
  WEEKLY
  BI_WEEKLY
  SEMI_MONTHLY
  MONTHLY
  QUARTERLY
}

# ─── Core Worker Types ────────────────────────────────────────────────────────

type Worker {
  id: ID!
  externalId: String
  type: WorkerType!
  status: String
  profile: WorkerDetails
  contractorProfile: ContractorProfile
  employeeProfile: EmployeeProfile
  contracts: [Contract!]
  activeContract: Contract
  onboarding: Onboarding
  offboarding: Offboarding
  team: Team
  manager: Manager
  country: Country
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WorkerDetails {
  id: ID!
  workerId: ID!
  firstName: String!
  lastName: String!
  preferredName: String
  email: String!
  personalEmail: String
  phone: String
  dateOfBirth: Date
  nationality: String
  address: Address
  taxId: String
  pronoun: String
  startDate: Date
  terminationDate: Date
  jobTitle: String
  seniority: String
  department: String
  costCenter: String
  updatedAt: DateTime!
}

type ContractorProfile {
  id: ID!
  workerId: ID!
  entityType: String
  businessName: String
  taxIdentificationNumber: String
  vatNumber: String
  preferredPaymentMethod: PaymentMethod
  bankAccounts: [PaymentMethod!]
  taxForms: [TaxForm!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EmployeeProfile {
  id: ID!
  workerId: ID!
  employeeId: String
  nationalId: String
  passportNumber: String
