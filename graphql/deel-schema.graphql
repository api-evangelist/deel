# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  worker(id: ID!): Worker
  workers(organizationId: ID!, type: WorkerType, status: String, limit: Int, offset: Int): [Worker!]!

  contract(id: ID!): Contract
  contracts(workerId: ID, organizationId: ID, status: ContractStatus, type: ContractType, limit: Int, offset: Int): [Contract!]!

  invoice(id: ID!): Invoice
  invoices(contractId: ID, workerId: ID, status: InvoiceStatus, periodStart: Date, periodEnd: Date, limit: Int, offset: Int): [Invoice!]!

  payment(id: ID!): Payment
  payments(workerId: ID, organizationId: ID, status: PaymentStatus, limit: Int, offset: Int): [Payment!]!

  payroll(id: ID!): Payroll
  payrollRuns(organizationId: ID!, status: PayrollStatus, limit: Int, offset: Int): [PayrollRun!]!

  milestone(id: ID!): Milestone
  milestones(contractId: ID!, status: MilestoneStatus): [Milestone!]!

  expense(id: ID!): Expense
  expenseReports(workerId: ID, organizationId: ID, status: ExpenseStatus, limit: Int, offset: Int): [ExpenseReport!]!

  organization(id: ID!): Organization
  team(id: ID!): Team
  teams(organizationId: ID!): [Team!]!

  country(isoCode: String!): Country
  countries(supportedProducts: [String!]): [Country!]!
  countryCompliance(isoCode: String!): CountryCompliance

  onboarding(workerId: ID!): Onboarding
  webhook(id: ID!): Webhook
  webhooks(organizationId: ID!): [Webhook!]!
  webhookEvents(webhookId: ID!, limit: Int, offset: Int): [WebhookEvent!]!

  integrations(organizationId: ID!, type: IntegrationType): [Integration!]!
}

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  createContract(input: CreateContractInput!): Contract!
  updateContract(id: ID!, input: UpdateContractInput!): Contract!
  terminateContract(id: ID!, reason: String!, terminationDate: Date!): Contract!

  submitInvoice(input: SubmitInvoiceInput!): Invoice!
  approveInvoice(id: ID!): Invoice!
  rejectInvoice(id: ID!, reason: String!): Invoice!

  createPayrollAdjustment(input: CreateAdjustmentInput!): Adjustment!
  submitExpense(input: SubmitExpenseInput!): Expense!
  approveExpense(id: ID!): Expense!

  createWebhook(input: CreateWebhookInput!): Webhook!
  updateWebhook(id: ID!, input: UpdateWebhookInput!): Webhook!
  deleteWebhook(id: ID!): Boolean!
  simulateWebhookEvent(webhookId: ID!, eventType: WebhookEventType!): WebhookEvent!

  createAPIKey(organizationId: ID!, name: String!, scopes: [String!]!): APIKey!
  revokeAPIKey(id: ID!): Boolean!
}

# ─── Input Types ─────────────────────────────────────────────────────────────

input CreateContractInput {
  workerId: ID!
  organizationId: ID!
  type: ContractType!
  title: String!
  currency: String!
  amount: Float!
  startDate: Date!
  endDate: Date
  country: String!
  jobTitle: String
  scope: String
}

input UpdateContractInput {
  title: String
  amount: Float
  endDate: Date
  scope: String
  jobTitle: String
}

input SubmitInvoiceInput {
  contractId: ID!
  currency: String!
  periodStart: Date!
  periodEnd: Date!
  items: [InvoiceItemInput!]!
  notes: String
}

input InvoiceItemInput {
  type: String!
  description: String!
  quantity: Float
  unitPrice: Float
  totalPrice: Float!
}

input CreateAdjustmentInput {
  workerId: ID!
  contractId: ID
  payrollId: ID
  type: AdjustmentType!
  description: String!
  amount: Float!
  currency: String!
  effectiveDate: Date!
}

input SubmitExpenseInput {
  workerId: ID!
  category: String!
  description: String
  amount: Float!
  currency: String!
  expenseDate: Date!
  receiptUrl: String
}

input CreateWebhookInput {
  organizationId: ID!
  url: String!
  description: String
  events: [WebhookEventType!]!
}

input UpdateWebhookInput {
  url: String
  description: String
  events: [WebhookEventType!]
  isActive: Boolean
}
