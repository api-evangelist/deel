# Deel Conceptual GraphQL Schema
# Derived from the Deel REST API: https://developer.deel.com/reference
# This is a conceptual schema for tooling and documentation purposes.
# Deel does not publish an official public GraphQL endpoint.

scalar DateTime
scalar Date
scalar JSON
scalar Upload

# ─── Enumerations ────────────────────────────────────────────────────────────

enum WorkerType {
  CONTRACTOR
  EOR_EMPLOYEE
  GLOBAL_PAYROLL_EMPLOYEE
  PEO_EMPLOYEE
  DIRECT_EMPLOYEE
}

enum ContractType {
  FIXED_RATE
  PAY_AS_YOU_GO
  MILESTONE
  EMPLOYER_OF_RECORD
  GLOBAL_PAYROLL
  PAYG_WITH_MILESTONES
}

enum ContractStatus {
  DRAFT
  PENDING_SIGNATURE
  ACTIVE
  AMENDED
  TERMINATED
  COMPLETED
  EXPIRED
}

enum PaymentStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
  REVERSED
  CANCELLED
}

enum InvoiceStatus {
  DRAFT
  SUBMITTED
  APPROVED
  REJECTED
  PAID
  VOIDED
}

enum MilestoneStatus {
  PENDING
  SUBMITTED
  APPROVED
  REJECTED
  PAID
}

enum PayrollStatus {
  OPEN
  LOCKED
  PROCESSING
  FINALIZED
  PAID
  CANCELLED
}

enum OnboardingStatus {
  INVITED
  IN_PROGRESS
  COMPLETED
  BLOCKED
  CANCELLED
}

enum ComplianceType {
  TAX_REGISTRATION
  KYC
  RIGHT_TO_WORK
  BACKGROUND_CHECK
  VISA
  CONTRACT_COMPLIANCE
  DATA_PRIVACY
}

enum ExpenseStatus {
  DRAFT
  SUBMITTED
  APPROVED
  REJECTED
  REIMBURSED
}

enum AdjustmentType {
  BONUS
  COMMISSION
  DEDUCTION
  CORRECTION
  ALLOWANCE
  REIMBURSEMENT
  OFF_CYCLE
}

enum BenefitType {
  HEALTH
  DENTAL
  VISION
  PENSION
  LIFE_INSURANCE
  WELLNESS
  EQUITY
  OTHER
}

enum EquityType {
  STOCK_OPTIONS
  RSU
  SAR
  PHANTOM_EQUITY
  DIRECT_SHARES
}

enum WebhookEventType {
  CONTRACT_CREATED
  CONTRACT_SIGNED
  CONTRACT_TERMINATED
  INVOICE_SUBMITTED
  INVOICE_APPROVED
  INVOICE_PAID
  PAYMENT_COMPLETED
  PAYMENT_FAILED
  PAYROLL_FINALIZED
  MILESTONE_APPROVED
  WORKER_ONBOARDED
  TIME_OFF_REQUESTED
  TIME_OFF_APPROVED
  EXPENSE_SUBMITTED
  EXPENSE_APPROVED
  BACKGROUND_CHECK_COMPLETED
}

enum IntegrationType {
  ACCOUNTING
  ATS
  HRIS
  SCIM
  PAYROLL
  BANKING
  ERP
  MDM
}

enum PaymentMethodType {
  BANK_TRANSFER_ACH
  BANK_TRANSFER_SWIFT
