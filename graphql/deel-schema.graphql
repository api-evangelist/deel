  updatedAt: DateTime!
}

# ─── Address ─────────────────────────────────────────────────────────────────

type Address {
  line1: String
  line2: String
  city: String
  state: String
  postalCode: String
  country: String
}

# ─── Contracts ────────────────────────────────────────────────────────────────

type Contract {
  id: ID!
