  terms: ContractTerms
  agreements: [Agreement!]
  milestones: [Milestone!]
  invoices: [Invoice!]
  amendments: [ContractDetails!]
  startDate: Date
  endDate: Date
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ContractDetails {
  id: ID!
  contractId: ID!
  title: String
  scope: String
  jobTitle: String
  seniority: String
  currency: String
  amount: Float
  rate: Float
  rateType: String
  country: String
  state: String
  timezone: String
  workingHoursPerWeek: Int
  probationPeriodDays: Int
  noticePeriodDays: Int
  intellectualPropertyClause: Boolean
  nonCompeteClause: Boolean
  signingDate: DateTime
  effectiveDate: Date
  pdfUrl: String
  version: Int
  createdAt: DateTime!
}

type ContractTerms {
  id: ID!
  contractId: ID!
  paymentFrequency: String
  paymentMethod: String
  currency: String
  baseAmount: Float
  overtimeRate: Float
